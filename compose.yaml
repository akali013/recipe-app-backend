services:
  prod-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    image: akali013/recipe-app-backend
    ports:
      - 5132:8080
    depends_on:
      db:
        condition: service_healthy
    secrets:
      - SA_PASSWORD

  dev-server:
    build:
        context: .
        dockerfile: Dockerfile.dev
    ports:
      - 5133:8080
    develop:
        watch:
          - action: sync
            path: .
            target: /src
    depends_on:
      db:
        condition: service_healthy
    secrets:
      - SA_PASSWORD

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: always
    volumes:
      - db-data:/var/opt/mssql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD_FILE=/run/secrets/SA_PASSWORD
      - MSSQL_PID=Express
    expose:
      - 1433
    healthcheck:
      test: [
        "CMD-SHELL",
        "pgrep sqlservr || exit 1"
      ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    secrets:
      - SA_PASSWORD

volumes:
    db-data:
secrets:
    SA_PASSWORD:
        file: db/db_password.txt
    
